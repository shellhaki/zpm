name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        zig: [0.12.0]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Build (Debug)
        run: zig build

      - name: Build (Release)
        run: zig build -Doptimize=ReleaseSafe

      - name: Test zpm help
        run: ./zig-out/bin/zpm --help 2>&1 || true

      - name: Test basic commands
        run: |
          cd /tmp
          ${{ github.workspace }}/zig-out/bin/zpm list

      - name: Check binary size
        run: |
          ls -lh ./zig-out/bin/zpm
          ls -lh ./zig-out/bin/zpmd 2>/dev/null || echo "zpmd may not be available on all systems"
