name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release archives
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.12.0

      - name: Build cross-platform archives
        run: scripts/build-cross.sh

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: zpm-release-archives
          path: releases/*.tar.gz

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          name: zpm-release-archives
          path: releases

      - name: Choose release tag
        id: release
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            title="ZPM ${GITHUB_REF_NAME}"
          else
            tag="main-latest"
            title="ZPM latest main"
            git tag -f "$tag" "$GITHUB_SHA"
            git push -f origin "refs/tags/$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
        run: |
          notes="Automated ZPM release for ${GITHUB_SHA}."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" releases/*.tar.gz --clobber
            gh release edit "$TAG" --title "$TITLE" --notes "$notes" --latest
          else
            gh release create "$TAG" releases/*.tar.gz --title "$TITLE" --notes "$notes" --latest
          fi
