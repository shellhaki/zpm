name: release

run-name: release ${{ github.event.inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.2"

      - name: Validate release tag
        run: |
          case "${RELEASE_TAG}" in
            v*) ;;
            *) echo "Release tag must start with v, got ${RELEASE_TAG}"; exit 1 ;;
          esac

      - name: Test daemon
        working-directory: daemon
        run: go test ./...

      - name: Test cli
        working-directory: src
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist/zpm-${{ matrix.goos }}-${{ matrix.goarch }}
          cd src
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o ../dist/zpm-${{ matrix.goos }}-${{ matrix.goarch }}/zpm${{ matrix.ext }}
          cd ../daemon
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o ../dist/zpm-${{ matrix.goos }}-${{ matrix.goarch }}/zpmd${{ matrix.ext }}
          cd ..
          cp README.md dist/zpm-${{ matrix.goos }}-${{ matrix.goarch }}/
          tar -czf dist/zpm-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C dist zpm-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    needs: build
    if: startsWith(github.event.inputs.tag || github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*.tar.gz
